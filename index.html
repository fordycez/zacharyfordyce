<!DOCTYPE html>
<html>
<head>
  <title>Zachary Fordyce</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Supabase File Manager</h1>
  <br/>
  <!-- Login Form -->
  <div id="loginDiv">
    <input type="email" id="email" placeholder="Enter your email" />
    <button onclick="login()">Send Magic Link</button>
    <p id="loginMsg"></p>
  </div>

  <!-- Logged-in user section -->
  <div id="userDiv" style="display:none;">
    <p>Welcome, <span id="userEmail"></span>! <button onclick="logout()">Logout</button></p>
    
    <!-- File Upload -->
    <input type="file" id="fileInput" />
    <button onclick="uploadFile()">Upload File</button>

    <h3>Your Files:</h3>
    <ul id="fileList"></ul>
  </div>
    <script type="module">
      import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
      
      const supabaseUrl = 'https://bxvaiaxgdhmqewrgltmo.supabase.co'
      const supabaseAnonKey = 'sb_publishable_Qt55GDu7leyPXVGRl6S4Ng_NweDMbl4'
      const supabase = createClient(supabaseUrl, supabaseAnonKey)
      const bucketName = 'secure'  // private bucket
      
      // Check if user is already logged in
      supabase.auth.onAuthStateChange((_event, session) => {
        if (session?.user) {
          showUser(session.user)
        } else {
          showLogin()
        }
      })
      
      // Show login form
      function showLogin() {
        document.getElementById('loginDiv').style.display = 'block'
        document.getElementById('userDiv').style.display = 'none'
      }
      
      // Show user section
      function showUser(user) {
        document.getElementById('loginDiv').style.display = 'none'
        document.getElementById('userDiv').style.display = 'block'
        document.getElementById('userEmail').textContent = user.email
        listFiles()
      }
      
      // Login using magic link
      async function login() {
        const email = document.getElementById('email').value
        const { error } = await supabase.auth.signInWithOtp({ email })
        const msg = error ? `Error: ${error.message}` : 'Magic link sent! Check your email.'
        document.getElementById('loginMsg').textContent = msg
      }
      
      // Logout
     window.logout() = async function {
        await supabase.auth.signOut()
        showLogin()
      }
      
      // Upload a file
        window.unploadFile() = async function {
        const fileInput = document.getElementById('fileInput')
        if (!fileInput.files.length) return alert('Select a file first!')
      
        const file = fileInput.files[0]
        const filePath = `${file.name}`
      
        // Upload to storage
        const { error: uploadError } = await supabase
          .storage
          .from(bucketName)
          .upload(filePath, file, { upsert: true })
      
        if (uploadError) return console.error(uploadError)
      
        // Insert record in files table
        const { error: dbError } = await supabase
          .from('files')
          .insert([{
            user_id: supabase.auth.getUser().then(res => res.data.user.id),
            file_name: file.name,
            file_path: filePath
          }])
      
        if (dbError) return console.error(dbError)
      
        alert('File uploaded!')
        listFiles()
      }
      
      // List user files
      async function listFiles() {
        const { data, error } = await supabase
          .from('files')
          .select('*')
          .order('created_at', { ascending: false })
      
        if (error) return console.error(error)
      
        const fileList = document.getElementById('fileList')
        fileList.innerHTML = ''
      
        for (const file of data) {
          // Create signed URL valid for 60 seconds
          const { data: signedData, error: signedError } = await supabase
            .storage
            .from(bucketName)
            .createSignedUrl(file.file_path, 60)
      
          if (signedError) {
            console.error('Signed URL error:', signedError)
            continue
          }
      
          const li = document.createElement('li')
          li.innerHTML = `<a href="${signedData.signedUrl}" target="_blank">${file.file_name}</a>`
          fileList.appendChild(li)
        }

        document.getElementById('logoutBtn').addEventListener('click', async () => {
          await supabase.auth.signOut()
          showLogin()
        })
        document.getElementById('uploadBtn').addEventListener('click', uploadFile)
      }
    </script>
  </div>
</body>
</html>
