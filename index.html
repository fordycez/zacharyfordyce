<!DOCTYPE html>
<html>
<head>
  <title>Zachary Fordyce</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Supabase File Manager</h1>

  <!-- Login Form -->
  <div id="loginDiv">
    <input type="email" id="email" placeholder="Enter your email" />
    <button id="loginBtn">Send Magic Link</button>
    <p id="loginMsg"></p>
  </div>
  
  <!-- Logged-in user section -->
  <div id="userDiv" style="display:none;">
    <p>Welcome, <span id="userEmail"></span>! <button id="logoutBtn">Logout</button></p>
    
    <!-- File Upload -->
    <input type="file" id="fileInput" />
    <button id="uploadBtn">Upload File</button>
  
    <h3>Your Files:</h3>
    <ul id="fileList"></ul>
  </div>
  
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
  
    const supabaseUrl = 'https://YOUR_PROJECT.supabase.co'
    const supabaseAnonKey = 'YOUR_ANON_KEY'
    const supabase = createClient(supabaseUrl, supabaseAnonKey)
    const bucketName = 'your-bucket-name'
  
    // Helper functions
    async function showUser(user) {
      document.getElementById('loginDiv').style.display = 'none'
      document.getElementById('userDiv').style.display = 'block'
      document.getElementById('userEmail').textContent = user.email
      await listFiles()
    }
  
    function showLogin() {
      document.getElementById('loginDiv').style.display = 'block'
      document.getElementById('userDiv').style.display = 'none'
    }
  
    // Auth state change listener
    supabase.auth.onAuthStateChange((_event, session) => {
      if (session?.user) {
        showUser(session.user)
      } else {
        showLogin()
      }
    })
  
    // Event listeners
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value
      const { error } = await supabase.auth.signInWithOtp({ email })
      document.getElementById('loginMsg').textContent = error ? error.message : 'Magic link sent! Check your email.'
    })
  
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await supabase.auth.signOut()
      showLogin()
    })
  
    document.getElementById('uploadBtn').addEventListener('click', async () => {
      const fileInput = document.getElementById('fileInput')
      if (!fileInput.files.length) return alert('Select a file first!')
      const file = fileInput.files[0]
      const filePath = file.name
  
      // Upload to storage
      const { error: uploadError } = await supabase
        .storage
        .from(bucketName)
        .upload(filePath, file, { upsert: true })
  
      if (uploadError) return console.error(uploadError)
  
      // Insert record in files table
      const userId = (await supabase.auth.getUser()).data.user.id
      const { error: dbError } = await supabase
        .from('files')
        .insert([{ user_id: userId, file_name: file.name, file_path: filePath }])
  
      if (dbError) return console.error(dbError)
  
      alert('File uploaded!')
      listFiles()
    })
  
    // List files for the logged-in user
    async function listFiles() {
      const userId = (await supabase.auth.getUser()).data.user.id
      const { data, error } = await supabase
        .from('files')
        .select('*')
        .eq('user_id', userId)
        .order('created_at', { ascending: false })
  
      if (error) return console.error(error)
  
      const fileList = document.getElementById('fileList')
      fileList.innerHTML = ''
  
      for (const file of data) {
        const { data: signedData, error: signedError } = await supabase
          .storage
          .from(bucketName)
          .createSignedUrl(file.file_path, 60)
  
        if (signedError) {
          console.error(signedError)
          continue
        }
  
        const li = document.createElement('li')
        li.innerHTML = `<a href="${signedData.signedUrl}" target="_blank">${file.file_name}</a>`
        fileList.appendChild(li)
      }
    }
  
    // Initial check
    const session = supabase.auth.getSession()
    session?.then(s => {
      if (s?.data?.session?.user) showUser(s.data.session.user)
    })
  </script>
</body>
</html>
