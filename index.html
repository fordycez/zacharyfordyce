<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zachary Fordyce | File Vault</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .brand h1 {
      font-size: 2rem;
      margin-bottom: 6px;
    }

    .brand p {
      color: #cbd5e1;
      font-size: 0.95rem;
    }

    .status-pill {
      background: rgba(34,197,94,0.18);
      color: #86efac;
      border: 1px solid rgba(34,197,94,0.35);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 0.9rem;
    }

    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 22px;
    }

    h2 {
      margin-bottom: 14px;
      font-size: 1.3rem;
    }

    p.subtext {
      color: #cbd5e1;
      margin-bottom: 18px;
      line-height: 1.5;
    }

    .input-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    input[type="email"] {
      flex: 1;
      min-width: 240px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 1rem;
      outline: none;
    }

    input[type="email"]::placeholder {
      color: #cbd5e1;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 0.98rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .primary-btn {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      box-shadow: 0 10px 24px rgba(37,99,235,0.35);
    }

    .primary-btn:hover {
      transform: translateY(-2px);
      opacity: 0.96;
    }

    .secondary-btn {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .secondary-btn:hover {
      background: rgba(255,255,255,0.16);
    }

    .danger-btn {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      box-shadow: 0 10px 24px rgba(220,38,38,0.28);
    }

    .danger-btn:hover {
      transform: translateY(-2px);
      opacity: 0.96;
    }

    .user-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      padding: 16px 18px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .user-email {
      color: #93c5fd;
      font-weight: bold;
      word-break: break-word;
    }

    .files-grid {
      display: grid;
      gap: 14px;
    }

    .file-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.2s ease;
    }

    .file-item:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.08);
    }

    .file-name {
      font-weight: 600;
      word-break: break-word;
    }

    .empty-state {
      padding: 26px;
      border-radius: 16px;
      text-align: center;
      color: #cbd5e1;
      background: rgba(255,255,255,0.04);
      border: 1px dashed rgba(255,255,255,0.14);
    }

    .footer-note {
      margin-top: 18px;
      color: #94a3b8;
      font-size: 0.88rem;
      text-align: center;
    }

    .loading {
      opacity: 0.7;
      pointer-events: none;
    }

    @media (max-width: 700px) {
      .container {
        padding: 22px;
        border-radius: 20px;
      }

      .header {
        align-items: flex-start;
      }

      .brand h1 {
        font-size: 1.7rem;
      }

      .file-item {
        flex-direction: column;
        align-items: flex-start;
      }

      .input-row {
        flex-direction: column;
      }

      .input-row button,
      .file-item button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand">
        <h1>File Vault</h1>
        <p>Private access to your Supabase storage files</p>
      </div>
      <div class="status-pill">Secure Access</div>
    </div>

    <!-- LOGIN -->
    <div id="loginDiv" class="card">
      <h2>Sign In</h2>
      <p class="subtext">
        Enter your email to receive a secure magic link and access your files.
      </p>
      <div class="input-row">
        <input type="email" id="email" placeholder="Enter your email address" />
        <button class="primary-btn" onclick="login()">Send Magic Link</button>
      </div>
    </div>

    <!-- APP -->
    <div id="appDiv" style="display:none;">
      <div class="user-bar">
        <div>
          <div style="font-size: 0.9rem; color: #cbd5e1;">Logged in as</div>
          <div id="userEmail" class="user-email"></div>
        </div>
        <button class="danger-btn" onclick="logout()">Logout</button>
      </div>

      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:18px;">
          <div>
            <h2>Your Files</h2>
            <p class="subtext" style="margin: 6px 0 0 0;">Browse files from your secure bucket.</p>
          </div>
          <button class="secondary-btn" onclick="loadFiles()">Refresh Files</button>
        </div>

        <div id="fileList" class="files-grid"></div>
      </div>
    </div>

    <div class="footer-note">
      Powered by Supabase Authentication + Storage
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const supabaseUrl = 'https://bxvaiaxgdhmqewrgltmo.supabase.co'
    const supabaseAnonKey = 'sb_publishable_Qt55GDu7leyPXVGRl6S4Ng_NweDMbl4'
    const bucketName = 'secure'

    const supabase = createClient(supabaseUrl, supabaseAnonKey)

    const loginDiv = document.getElementById('loginDiv')
    const appDiv = document.getElementById('appDiv')
    const userEmail = document.getElementById('userEmail')
    const fileList = document.getElementById('fileList')

    // LOGIN
    window.login = async function () {
      const email = document.getElementById('email').value.trim()

      if (!email) {
        alert('Please enter your email first.')
        return
      }

      const button = document.querySelector('.primary-btn')
      button.textContent = 'Sending...'
      button.disabled = true

      const { error } = await supabase.auth.signInWithOtp({
        email,
        options: {
          emailRedirectTo: window.location.origin + window.location.pathname
        }
      })

      button.textContent = 'Send Magic Link'
      button.disabled = false

      if (error) {
        alert('Login error: ' + error.message)
      } else {
        alert('Magic link sent! Check your email.')
      }
    }

    // LOGOUT
    window.logout = async function () {
      const { error } = await supabase.auth.signOut()

      if (error) {
        alert('Logout failed: ' + error.message)
        return
      }

      window.location.href = window.location.origin + window.location.pathname
    }

    // CHECK USER
    async function checkUser() {
      const { data: { session } } = await supabase.auth.getSession()

      if (session?.user) {
        loginDiv.style.display = 'none'
        appDiv.style.display = 'block'
        userEmail.textContent = session.user.email
        loadFiles()
      } else {
        loginDiv.style.display = 'block'
        appDiv.style.display = 'none'
      }
    }

      console.log('Auth event:', event, session);
      await updateUI();

    // Initial UI state
    await updateUI();
*/




    

    // LOAD FILES
    window.loadFiles = async function () {
      fileList.innerHTML = '<div class="empty-state">Loading files...</div>'

      const { data, error } = await supabase.storage
        .from(bucketName)
        .list('', {
          limit: 100,
          offset: 0
        })

      if (error) {
        fileList.innerHTML = '<div class="empty-state">Error loading files: ' + error.message + '</div>'
        return
      }

      if (!data || data.length === 0) {
        fileList.innerHTML = '<div class="empty-state">No files found in this bucket.</div>'
        return
      }

      fileList.innerHTML = ''

      data.forEach(file => {
        const fileRow = document.createElement('div')
        fileRow.className = 'file-item'

        const fileName = document.createElement('div')
        fileName.className = 'file-name'
        fileName.textContent = file.name

        const downloadBtn = document.createElement('button')
        downloadBtn.className = 'secondary-btn'
        downloadBtn.textContent = 'Download'

        downloadBtn.onclick = async () => {
          const { data } = await supabase.storage
            .from(bucketName)
            .createSignedUrl(`job.txt`, 86400)

          if (data?.signedUrl) {
            window.open(data.signedUrl, '_blank')
          } else {
            alert('Could not generate file URL.')
          }
        }

        fileRow.appendChild(fileName)
        fileRow.appendChild(downloadBtn)
        fileList.appendChild(fileRow)
      })
    }

    supabase.auth.onAuthStateChange(() => {
      checkUser()
    })

    checkUser()
  </script>
</body>
</html>
